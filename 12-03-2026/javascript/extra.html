<html>
    <head>
        <title>Extra Assigment</title>
    </head>
    <body>
        <label for="password">Enter length of password : </label>
        <input type="number" id="number" />
        <button type="button" onclick="genrate()">Button</button>
        <h4>Password Generated by server :</h4>
        <p id="element"></p>
        <script>

function genrate(){
            
        var string = "abcdereafedadawdwad@!@##123456789";
        var input = document.getElementById("number").value;
        
        let password = "";
        for(var i = 0 ; i < input ; i ++){
          password += string[Math.floor(Math.random()*12)];
        }
        document.getElementById("element").innerText = password;
    
        }

        
        </script>
    </body>
</html>
